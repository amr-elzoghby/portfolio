name: Deploy Portfolio

on:
  push:
    branches: [ main ]

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::644981759771:role/GitHubActionsDeployRole
          aws-region: us-east-1

      - name: Sync Files to S3
        run: |
          aws s3 sync . s3://amr-saad-devops-portfolio-2026 \
            --delete \
            --exclude "infra/*" \
            --exclude ".git/*" \
            --exclude ".github/*"

      - name: Invalidate CloudFront Cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id E3QTIR9CSOWXWM \
            --paths "/*"
